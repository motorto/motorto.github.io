# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: My Personal Website # The website title
first_name: André
last_name: Cerqueira
email: acerqueira021@gmail.com
description: >
  Passionate computer science graduate specializing in C++ development and high-performance computing, eager to innovate and solve complex challenges in embedded systems and software engineering.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a> with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.
  Hosted by <a href="https://pages.github.com/" target="_blank">GitHub Pages</a>.
keywords: C++, embedded systems, high-performance computing, software development, SYCL, Linux, parallel computing
lang: en # Language of your site
icon: ⚛️ # Emoji used as the favicon
url: https://motorto.github.io # Base URL for your site
baseurl: # Leave blank for root

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: true

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

max_width: 930px

# -----------------------------------------------------------------------------
# Social integration (removed all unused social platforms)
# -----------------------------------------------------------------------------

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge

include: ["_pages"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - Dockerfile
  - docker-compose.yml
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor

# Keep essential files for Jekyll/GitHub Pages
keep_files:
  - CNAME
  - .nojekyll

# -----------------------------------------------------------------------------
# Plugins (only keeping required plugins)
# -----------------------------------------------------------------------------

plugins:
  - jekyll-feed
  - jekyll-sitemap

# Sitemap settings
defaults:
  - scope:
      path: "assets"
    values:
      sitemap: false

sass:
  style: compressed

# -----------------------------------------------------------------------------
# Optional Features
# -----------------------------------------------------------------------------

enable_darkmode: true # Enables switching between light/dark modes

# -----------------------------------------------------------------------------
# Get external JSON data (if needed for CV)
# -----------------------------------------------------------------------------

jekyll_get_json:
  - data: resume
    json: assets/json/resume.json
